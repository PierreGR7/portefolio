    <path d="M300 0 V630 M600 0 V630 M900 0 V630"/>
  </g>

  <text x="80" y="250" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="40" fill="#7fd9c8" letter-spacing="6">GUIDE · DATA / FABRIC</text>
  <text x="76" y="360" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="104" font-weight="700" fill="#ffffff">Microsoft Fabric</text>
  <text x="80" y="430" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="44" fill="#c5e7e1">Monitoring &amp; cutting capacity costs</text>

  <text x="80" y="560" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="30" fill="#6f9aa0">pierre graef</text>
</svg>
