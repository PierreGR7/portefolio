<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="Microsoft Fabric — Monitoring and cutting capacity costs">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#04201c"/>
      <stop offset="55%" stop-color="#0a3d4d"/>
      <stop offset="100%" stop-color="#10233f"/>
    </linearGradient>
    <radialGradient id="glow" cx="80%" cy="26%" r="58%">
      <stop offset="0%" stop-color="#2dd4bf" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#2dd4bf" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glow)"/>

  <!-- subtle grid -->
  <g stroke="#ffffff" stroke-opacity="0.05" stroke-width="1">
